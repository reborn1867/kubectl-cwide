name: e2e
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  kind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: cwide-e2e
      - name: Verify cluster
        run: kubectl get nodes
      - name: Run e2e
        run: bash hack/e2e-test.sh
